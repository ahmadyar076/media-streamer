<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player — StreamBox</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="player" data-media-id="{{ media_id }}">
    <div class="app-layout">

        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="logo-icon">&#9654;</span>
                <h1>StreamBox</h1>
            </div>
            <div class="sidebar-divider"></div>
            <nav class="sidebar-nav">
                <div class="nav-label">Menu</div>
                <ul>
                    <li><a href="/" class="nav-link">
                        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                        <span>Home</span>
                    </a></li>
                    <li><a href="/library" class="nav-link">
                        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
                        <span>Library</span>
                    </a></li>
                </ul>
            </nav>

            <div class="sidebar-now-playing" id="sidebarNP" style="display:none;">
                <div class="np-label">
                    <div class="np-bars"><span></span><span></span><span></span><span></span></div>
                    Now Playing
                </div>
                <div class="np-title" id="npTitle">--</div>
            </div>
        </aside>

        <div class="sidebar-overlay"></div>

        <main class="main-content">
            <header class="topbar">
                <button class="hamburger-btn" title="Menu">
                    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
                <a href="/library" class="btn-back">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                    Back to Library
                </a>
            </header>

            <section class="player-view" id="playerView">
                <div class="player-stage">
                    <div class="buffering-spinner"></div>
                    <div class="stage-placeholder">
                        <svg viewBox="0 0 24 24" width="64" height="64"><path d="M8 5v14l11-7z"/></svg>
                        <p>Loading media...</p>
                    </div>
                </div>

                <!-- Audio Visualizer (shown only for audio) -->
                <div class="audio-visualizer" id="audioVisualizer" style="display:none;">
                    <canvas id="visualizerCanvas"></canvas>
                </div>

                <div class="player-details" id="playerDetails">
                    <h2 class="detail-title">--</h2>
                    <div class="detail-meta">
                        <span class="detail-type">--</span>
                        <span class="detail-size">--</span>
                        <span class="detail-duration">--</span>
                    </div>
                </div>
            </section>
        </main>

        <footer class="player-bar">
            <div class="player-track">
                <div class="track-thumb"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
                <div class="track-info"><span class="track-title">No media selected</span><span class="track-artist">--</span></div>
            </div>
            <div class="player-controls">
                <div class="control-buttons">
                    <button class="btn-control" title="Previous"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                    <button class="btn-control btn-play" id="playBtn" title="Play">
                        <svg viewBox="0 0 24 24" class="icon-play"><path d="M8 5v14l11-7z"/></svg>
                        <svg viewBox="0 0 24 24" class="icon-pause" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button class="btn-control" title="Next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                </div>
                <div class="progress-container">
                    <span class="time-current">0:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-buffer" id="progressBuffer"></div>
                        <div class="progress-fill" id="progressFill"></div>
                        <div class="progress-handle" id="progressHandle"></div>
                    </div>
                    <span class="time-total">0:00</span>
                </div>
            </div>
            <div class="player-extra">
                <button class="btn-control" id="muteBtn" title="Mute">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
                <div class="volume-slider-container">
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="75">
                </div>
            </div>
        </footer>
    </div>
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
