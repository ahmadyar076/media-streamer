<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library — StreamBox</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="library">
    <div class="app-layout">

        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="logo-icon">&#9654;</span>
                <h1>StreamBox</h1>
            </div>
            <div class="sidebar-divider"></div>
            <nav class="sidebar-nav">
                <div class="nav-label">Menu</div>
                <ul>
                    <li><a href="/" class="nav-link">
                        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                        <span>Home</span>
                    </a></li>
                    <li><a href="/library" class="nav-link active">
                        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
                        <span>Library</span>
                    </a></li>
                </ul>
                <div class="nav-label">Categories</div>
                <ul>
                    <li><a href="/library?type=video" class="nav-link">
                        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
                        <span>Videos</span>
                    </a></li>
                    <li><a href="/library?type=audio" class="nav-link">
                        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                        <span>Audio</span>
                    </a></li>
                </ul>
            </nav>
        </aside>

        <div class="sidebar-overlay"></div>

        <main class="main-content">
            <header class="topbar">
                <button class="hamburger-btn" title="Menu">
                    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" placeholder="Search media..." id="searchInput">
                </div>
                <div class="topbar-actions">
                    <button class="btn-icon" title="Refresh" id="refreshBtn">
                        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    </button>
                </div>
            </header>

            <section class="content-section">
                <div class="section-header">
                    <h2>Library</h2>
                    <span class="media-count" id="mediaCount">0 items</span>
                </div>

                <!-- Toolbar: Filters + Sort + View Toggle -->
                <div class="toolbar" style="margin-bottom: 20px;">
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-type="all">All</button>
                        <button class="filter-btn" data-type="video">Video</button>
                        <button class="filter-btn" data-type="audio">Audio</button>
                    </div>
                    <select class="sort-select" id="sortSelect">
                        <option value="modified">Recent</option>
                        <option value="title">Name A-Z</option>
                        <option value="title-desc">Name Z-A</option>
                        <option value="size">Size</option>
                        <option value="duration">Duration</option>
                    </select>
                    <div class="view-toggle">
                        <button class="view-btn active" data-view="grid" title="Grid view">
                            <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm0 10h8v8H3v-8zM13 3h8v8h-8V3zm0 10h8v8h-8v-8z"/></svg>
                        </button>
                        <button class="view-btn" data-view="list" title="List view">
                            <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                        </button>
                    </div>
                </div>

                <div class="media-grid" id="libraryGrid">
                    <div class="empty-state" id="emptyState">
                        <svg viewBox="0 0 24 24" width="64" height="64"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
                        <h3>No media found</h3>
                        <p>Add video or audio files to the <code>media/</code> folder and click refresh.</p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="player-bar">
            <div class="player-track">
                <div class="track-thumb"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
                <div class="track-info"><span class="track-title">No media selected</span><span class="track-artist">--</span></div>
            </div>
            <div class="player-controls">
                <div class="control-buttons">
                    <button class="btn-control" title="Previous"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                    <button class="btn-control btn-play" title="Play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
                    <button class="btn-control" title="Next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                </div>
                <div class="progress-container">
                    <span class="time-current">0:00</span>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                    <span class="time-total">0:00</span>
                </div>
            </div>
            <div class="player-extra">
                <button class="btn-control" title="Mute"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>
                <div class="volume-slider-container"><input type="range" class="volume-slider" min="0" max="100" value="75"></div>
            </div>
        </footer>
    </div>
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
